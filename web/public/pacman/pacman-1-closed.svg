<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="body1" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#FFE15A"/>
      <stop offset="55%" stop-color="#FFC400"/>
      <stop offset="100%" stop-color="#E89A00"/>
    </radialGradient>
    <radialGradient id="rim1" cx="50%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#B36F00" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B36F00" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="100" cy="184" rx="62" ry="6" fill="#000" opacity="0.18"/>
  <g filter="url(#shadow1)">
    <!-- Frame 1: mouth fully closed -->
    <circle cx="100" cy="100" r="86" fill="url(#body1)"/>
    <circle cx="100" cy="100" r="86" fill="url(#rim1)"/>
    <!-- glossy highlights -->
    <ellipse cx="62" cy="52" rx="30" ry="20" fill="#FFFFFF" opacity="0.85" transform="rotate(-28 62 52)"/>
    <ellipse cx="86" cy="42" rx="10" ry="6" fill="#FFFFFF" opacity="0.95" transform="rotate(-28 86 42)"/>
    <!-- eye-area shine -->
    <path d="M 122 50 Q 138 56 134 72 Q 124 64 122 50 Z" fill="#FFFFFF" opacity="0.7"/>
  </g>
</svg>
